services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: border
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-border}
      POSTGRES_DB: border
    volumes:
      - ${POSTGRES_DATA_DIR:-./pgdata}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U border"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://border:${POSTGRES_PASSWORD:-border}@postgres:5432/border?sslmode=disable
      LISTEN_ADDR: ":8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  crawler:
    build: ./crawler
    environment:
      DATABASE_URL: postgres://border:${POSTGRES_PASSWORD:-border}@postgres:5432/border?sslmode=disable
      CRAWL_INTERVAL: ${CRAWL_INTERVAL:-15m}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped
