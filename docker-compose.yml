services:
  postgres:
    image: postgres:18-alpine
    user: "1000:1000"
    environment:
      POSTGRES_USER: border
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-border}
      POSTGRES_DB: border
      PGDATA: /data/pgdata
    volumes:
      - ${POSTGRES_DATA_DIR:-./pgdata}:/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U border"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://border:${POSTGRES_PASSWORD:-border}@postgres:5432/border?sslmode=disable
      LISTEN_ADDR: ":8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  crawler:
    build:
      context: ./crawler
      additional_contexts:
        migrations: ./migrations
    environment:
      DATABASE_URL: postgres://border:${POSTGRES_PASSWORD:-border}@postgres:5432/border?sslmode=disable
      CRAWL_INTERVAL: ${CRAWL_INTERVAL:-15m}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-80}:8080"
    depends_on:
      - backend
    restart: unless-stopped

  pgweb:
    image: sosedoff/pgweb:0.17.0
    environment:
      PGWEB_DATABASE_URL: postgres://border:${POSTGRES_PASSWORD:-border}@postgres:5432/border?sslmode=disable
    ports:
      - "${PGWEB_PORT:-8081}:8081"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
