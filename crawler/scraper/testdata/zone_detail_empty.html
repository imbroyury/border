<!DOCTYPE html>
<html>
<head><title>Зоны ожидания - Брест</title></head>
<body>
<app-root>
  <div class="page">
    <div class="content">
      <div class="info">
        <a href="/zone" class="back-link">Назад</a>
      </div>
      <div class="stats">
        <span class="stats__item">0 направлено за последний час</span>
        <span class="stats__item">0 направлено за последние 24 часа</span>
      </div>
      <div class="table__wrapper">
        <table class="table">
          <thead>
            <tr class="table__heading">
              <th class="table__heading-cell">Порядок вызова</th>
              <th class="table__heading-cell">Тип очереди</th>
              <th class="table__heading-cell">Рег.номер</th>
              <th class="table__heading-cell">Дата регистрации в ЗО</th>
              <th class="table__heading-cell">Статус изменен</th>
              <th class="table__heading-cell">Статус</th>
            </tr>
          </thead>
          <tbody>
            <tr class="table__empty">
              <td colspan="6">Записи не найдены</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</app-root>
</body>
</html>
